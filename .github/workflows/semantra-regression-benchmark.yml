name: Semantra Regression Benchmark

on:
  workflow_dispatch:
    inputs:
      dataset_id:
        description: Saved benchmark dataset id to run
        required: true
        default: "1"
      with_llm:
        description: Run with configured LLM validator
        required: false
        default: "false"
  schedule:
    - cron: "0 7 * * 1"

jobs:
  run-regression-benchmark:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Semantra/backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run saved benchmark through API
        env:
          SEMANTRA_API_BASE_URL: ${{ secrets.SEMANTRA_API_BASE_URL }}
          SEMANTRA_ADMIN_API_TOKEN: ${{ secrets.SEMANTRA_ADMIN_API_TOKEN }}
        run: |
          python scripts/run_saved_benchmark.py \
            --dataset-id "${{ github.event.inputs.dataset_id || '1' }}" \
            ${{ github.event.inputs.with_llm == 'true' && '--with-llm' || '' }}